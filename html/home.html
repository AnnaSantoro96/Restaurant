    <!-- Badge rotondo nero: Innamorato della pasta -->
    <div class="badge-circle">
      <svg class="ring-text" width="160" height="160" viewBox="0 0 160 160">
        <defs>
          <path id="circle-text" d="M80,80 m-58,0 a58,58 0 1,1 116,0 a58,58 0 1,1 -116,0"/>
        </defs>
        <text font-size="13" fill="#d4e157" font-weight="600" letter-spacing="2">
          <textPath href="#circle-text" startOffset="0%">INNAMORATO DELLA PASTA</textPath>
        </text>
      </svg>
      <svg class="heart" width="30" height="30" viewBox="0 0 24 24">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#d4e157"/>
      </svg>
    </div>
 
    <!-- Badge cloud verde: Delizioso -->
    <div class="badge-cloud">
      <span>Delizioso</span>
    </div>
 
    <!-- Badge ovale giallo: Buon Appetito -->
    <div class="badge-oval">
      <span>Buon Appetito</span>
    </div>
  </div>

      <div class="order">
          <h1>Fresh Pasta,<br> delivered to <br>your door</h1>

      <div class="contact">
        <h2>Contact Us</h2>
        <form method="post" action=""> 
          <fieldset>
            <label for="email">
              Enter your email:
              <input type="email" id="email" name="email" required>
            </label>

            <label for="message">
              Enter a message:
              <textarea id="message" name="message" rows="3" cols="30" placeholder="Leave a message..."></textarea>
            </label>

            <input type="submit" value="Send">
          </fieldset>
        </form>
      </div>
